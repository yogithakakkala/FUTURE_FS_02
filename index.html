<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadFlow CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080a10;--s:#0d1017;--s2:#121620;--s3:#181d28;--bd:rgba(255,255,255,0.07);--bh:rgba(99,179,237,0.3);--tx:#e8eaf2;--tm:#6b7280;--td:#9ca3af;--ac:#63b3ed;--nw:#60a5fa;--ct:#fbbf24;--cv:#34d399;--dg:#f87171;--pu:#a78bfa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

/* LOGIN */
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.2;animation:fl 8s ease-in-out infinite}
.o1{width:350px;height:350px;background:#63b3ed;top:-80px;left:-80px}
.o2{width:280px;height:280px;background:#a78bfa;bottom:-40px;right:-60px;animation-delay:-3s}
.o3{width:180px;height:180px;background:#34d399;top:40%;left:40%;animation-delay:-5s}
@keyframes fl{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,179,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,.04) 1px,transparent 1px);background-size:40px 40px}
.lcard{position:relative;z-index:1;background:rgba(13,16,23,.92);border:1px solid var(--bh);border-radius:22px;padding:38px;width:100%;max-width:400px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(99,179,237,.12),0 30px 60px rgba(0,0,0,.5);animation:ci .5s ease}
@keyframes ci{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.lmark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem;color:#fff;box-shadow:0 0 18px rgba(99,179,237,.4)}
.llogo{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.lbrand{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800}
.ltag{font-size:.58rem;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.ltitle{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:5px}
.lsub{color:var(--tm);font-size:.83rem;margin-bottom:24px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fg label{font-size:.68rem;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.8px}
.fg input{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--bh);box-shadow:0 0 0 3px rgba(99,179,237,.1)}
.lerr{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--dg);padding:9px 13px;border-radius:8px;font-size:.78rem;margin-bottom:11px}
.hint{text-align:center;font-size:.7rem;color:var(--tm);margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .18s}
.bp{background:linear-gradient(135deg,#63b3ed,#4299e1);color:#fff;box-shadow:0 0 18px rgba(99,179,237,.3);width:100%;justify-content:center;padding:12px;font-size:.92rem;margin-top:4px}
.bp:hover{box-shadow:0 0 28px rgba(99,179,237,.5);transform:translateY(-1px)}
.bg2{background:var(--s2);color:var(--td);border:1px solid var(--bd)}
.bg2:hover{background:var(--s3);color:var(--tx)}
.bsm{padding:5px 11px;font-size:.72rem;border-radius:7px}

/* APP */
#app{display:none;height:100vh;flex-direction:row;overflow:hidden}
.sidebar{width:215px;flex-shrink:0;background:var(--s);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.slogo{padding:20px 16px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:11px}
.smark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.68rem;color:#fff}
.stxt{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800}
.ssub{font-size:.54rem;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.nav{flex:1;padding:12px 9px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nlbl{font-size:.58rem;color:var(--tm);text-transform:uppercase;letter-spacing:2px;padding:5px 10px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:.81rem;font-weight:500;color:var(--tm);transition:all .17s;border:1px solid transparent}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.on{color:var(--ac);background:rgba(99,179,237,.08);border-color:rgba(99,179,237,.18)}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nbadge{margin-left:auto;font-size:.61rem;font-weight:700;padding:2px 6px;border-radius:20px;background:var(--s3);color:var(--td)}
.nbadge.nn{background:rgba(96,165,250,.15);color:var(--nw)}
.nbadge.nc{background:rgba(251,191,36,.15);color:var(--ct)}
.nbadge.nv{background:rgba(52,211,153,.15);color:var(--cv)}
.sfoot{padding:13px;border-top:1px solid var(--bd)}
.apill{display:flex;align-items:center;gap:9px;background:var(--s2);border-radius:9px;padding:9px 11px}
.aav{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.aname{font-size:.78rem;font-weight:600}
.arole{font-size:.6rem;color:var(--tm)}
.lout{margin-left:auto;background:none;border:none;color:var(--tm);cursor:pointer;font-size:.88rem;transition:color .2s}
.lout:hover{color:var(--dg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 26px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(13,16,23,.95);flex-shrink:0;gap:10px}
.ptitle{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700}
.pbc{font-size:.66rem;color:var(--tm);margin-top:2px}
.tr{display:flex;align-items:center;gap:9px;flex-shrink:0}
.sb{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:7px 11px;transition:border-color .2s}
.sb:focus-within{border-color:var(--bh)}
.sb input{background:transparent;border:none;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.81rem;width:155px}
.sb input::placeholder{color:var(--tm)}
.content{flex:1;padding:22px 26px;overflow-y:auto}
.view{display:none}.view.on{display:block;animation:vi .28s ease}
@keyframes vi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.sc{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:18px;position:relative;overflow:hidden;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc::after{content:'';position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;filter:blur(35px);opacity:.2}
.sc.bl{border-color:rgba(96,165,250,.12)}.sc.bl::after{background:var(--nw)}.sc.bl:hover{box-shadow:0 0 25px rgba(96,165,250,.1)}
.sc.am{border-color:rgba(251,191,36,.12)}.sc.am::after{background:var(--ct)}.sc.am:hover{box-shadow:0 0 25px rgba(251,191,36,.1)}
.sc.or{border-color:rgba(249,115,22,.12)}.sc.or::after{background:#f97316}.sc.or:hover{box-shadow:0 0 25px rgba(249,115,22,.1)}
.sc.gr{border-color:rgba(52,211,153,.12)}.sc.gr::after{background:var(--cv)}.sc.gr:hover{box-shadow:0 0 25px rgba(52,211,153,.1)}
.sico{position:absolute;top:14px;right:16px;font-size:1.1rem;opacity:.28}
.slbl{font-size:.64rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--tm);margin-bottom:7px}
.sval{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;line-height:1}
.sc.bl .sval{color:var(--nw)}.sc.am .sval{color:var(--ct)}.sc.or .sval{color:#f97316}.sc.gr .sval{color:var(--cv)}
.str{font-size:.68rem;color:var(--tm);margin-top:7px}
.spulse{position:absolute;bottom:13px;right:15px;width:7px;height:7px;border-radius:50%;background:var(--nw);animation:pu 2s infinite}
@keyframes pu{70%{box-shadow:0 0 0 7px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.cc{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:18px}
.ctit{font-size:.63rem;text-transform:uppercase;letter-spacing:2px;color:var(--tm);font-weight:600;margin-bottom:14px}

/* PIPELINE */
.pb{display:flex;flex-direction:column;gap:9px}
.pi{display:flex;flex-direction:column;gap:4px}
.pilbl{display:flex;justify-content:space-between;font-size:.76rem}
.pitr{height:7px;background:var(--s3);border-radius:20px;overflow:hidden}
.pif{height:100%;border-radius:20px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pif.nw{background:linear-gradient(90deg,var(--nw),#93c5fd)}
.pif.ct{background:linear-gradient(90deg,var(--ct),#fcd34d)}
.pif.cv{background:linear-gradient(90deg,var(--cv),#6ee7b7)}

/* DONUT */
.dw{display:flex;align-items:center;justify-content:center;gap:20px}
.dsv{width:100px;height:100px;transform:rotate(-90deg);flex-shrink:0}
.dl{display:flex;flex-direction:column;gap:7px}
.dli{display:flex;align-items:center;gap:7px;font-size:.73rem}
.dsw{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.dlv{font-weight:700;color:var(--tx);margin-left:auto;padding-left:7px}

/* SPARK */
.spkc canvas{display:block;width:100%}
.spklbl{display:flex;justify-content:space-between;margin-top:5px}
.spklbl span{font-size:.6rem;color:var(--tm)}

/* ACTIVITY */
.alist{display:flex;flex-direction:column;max-height:170px;overflow-y:auto}
.ait{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd)}
.ait:last-child{border-bottom:none}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.atx{font-size:.78rem;color:var(--td);line-height:1.4}
.atx strong{color:var(--tx)}
.atm{font-size:.65rem;color:var(--tm);margin-top:2px}
.eact{font-size:.78rem;color:var(--tm);padding:14px 0;text-align:center}

/* LEADS TABLE */
.ltb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.flt{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:6px 13px;border-radius:7px;font-size:.76rem;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--tm);transition:all .17s;font-family:'DM Sans',sans-serif}
.fb:hover,.fb.on{color:var(--tx);border-color:var(--ac);background:rgba(99,179,237,.08)}
.lmeta{font-size:.73rem;color:var(--tm)}
.tcard{background:var(--s);border:1px solid var(--bd);border-radius:15px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px 15px;text-align:left;font-size:.63rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:1.1px;background:var(--s2);border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap}
th:hover{color:var(--tx)}
td{padding:12px 15px;font-size:.81rem;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .14s}
tbody tr:hover{background:var(--s2)}
.lnm{font-weight:600;color:var(--tx)}
.lco{font-size:.7rem;color:var(--tm)}
.stag{background:var(--s3);color:var(--td);padding:3px 8px;border-radius:5px;font-size:.7rem}
.dc{font-size:.73rem;color:var(--tm);white-space:nowrap}
.np{max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.73rem;color:var(--tm)}
.ac2{display:flex;gap:4px}
.ab{padding:5px 8px;border-radius:6px;cursor:pointer;font-size:.7rem;font-weight:600;border:1px solid var(--bd);background:var(--s2);color:var(--tm);transition:all .14s;font-family:'DM Sans',sans-serif}
.ab:hover{background:var(--s3);color:var(--tx)}
.ab.ed:hover{border-color:var(--ac);color:var(--ac)}
.ab.nt:hover{border-color:var(--pu);color:var(--pu)}
.ab.dl:hover{border-color:var(--dg);color:var(--dg);background:rgba(248,113,113,.08)}
.ssel{background:var(--s3);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.73rem;padding:3px 7px;cursor:pointer;outline:none}
.tempty{padding:50px 20px;text-align:center}
.eico{font-size:2rem;opacity:.13;margin-bottom:10px}
.emsg{color:var(--tm);margin-bottom:14px;font-size:.83rem}

/* ANALYTICS */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.acard{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:20px}
.acard.full{grid-column:1/-1}
.fw{display:flex;flex-direction:column;gap:7px}
.fs{display:flex;align-items:center;gap:12px}
.fl2{width:85px;font-size:.76rem;color:var(--td);flex-shrink:0}
.ft{height:30px;background:var(--s3);border-radius:7px;overflow:hidden;flex:1}
.ff{height:100%;border-radius:7px;display:flex;align-items:center;padding:0 10px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.ff span{font-size:.73rem;font-weight:700;color:#fff;white-space:nowrap}
.fp{width:45px;text-align:right;font-size:.76rem;font-weight:700}
.bklist{display:flex;flex-direction:column;gap:11px}
.bki{display:flex;align-items:center;gap:9px}
.bkd{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.bkn{flex:1;font-size:.8rem;color:var(--td)}
.bkc{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700}
.bkp{font-size:.7rem;color:var(--tm);margin-left:3px}
.srlist{display:flex;flex-direction:column;gap:9px}
.sri-lbl{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:4px}
.sri-lbl span:last-child{font-weight:600}
.srtr{height:5px;background:var(--s3);border-radius:20px;overflow:hidden}
.srfill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--pu),#818cf8);transition:width 1s cubic-bezier(.4,0,.2,1)}
.trchart{display:flex;align-items:flex-end;gap:7px;height:75px;padding-top:8px}
.trcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.trbar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--ac),rgba(99,179,237,.2));min-height:3px}
.trlbl{font-size:.58rem;color:var(--tm)}

/* MODAL */
.mo{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px}
.mo.open{display:flex;animation:oi .18s ease}
@keyframes oi{from{opacity:0}to{opacity:1}}
.md{background:var(--s);border:1px solid var(--bh);border-radius:18px;width:100%;max-width:540px;box-shadow:0 0 60px rgba(0,0,0,.6);animation:mi .28s cubic-bezier(.22,1,.36,1);max-height:90vh;overflow-y:auto}
@keyframes mi{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.mt2{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700}
.mc{background:none;border:none;color:var(--tm);cursor:pointer;font-size:1rem}
.mc:hover{color:var(--tx)}
.mb{padding:18px 22px}
.mf{display:flex;justify-content:flex-end;gap:9px;padding:0 22px 20px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg2{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg2 label{font-size:.68rem;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.8px}
.fg2 input,.fg2 select,.fg2 textarea{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s;width:100%}
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus{border-color:var(--bh);box-shadow:0 0 0 3px rgba(99,179,237,.1)}
.fg2 select option{background:var(--s2)}
.fg2 textarea{resize:vertical;min-height:75px}
.ssel2{display:flex;gap:7px}
.so{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;font-size:.76rem;font-weight:600;color:var(--tm);transition:all .14s}
.so:hover{border-color:var(--bh);color:var(--tx)}
.so.on{background:rgba(99,179,237,.1);border-color:var(--bh);color:var(--tx)}
.sdot{width:6px;height:6px;border-radius:50%}
.nmod{max-width:460px}
.nli{background:var(--s2);border-radius:9px;padding:11px 13px;margin-bottom:13px;font-size:.8rem;color:var(--td)}
.nli strong{color:var(--tx);display:block;margin-bottom:2px}
.nhist{display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto;margin-bottom:13px}
.nit{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px}
.ntx{font-size:.8rem;color:var(--td);line-height:1.5}
.nmeta{font-size:.65rem;color:var(--tm);margin-top:4px}
.nnmsg{font-size:.78rem;color:var(--tm);text-align:center;padding:14px 0}
.nadd{display:flex;flex-direction:column;gap:7px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--s3);border:1px solid var(--bh);color:var(--tx);padding:11px 18px;border-radius:11px;font-size:.81rem;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.4);transform:translateY(18px);opacity:0;transition:all .28s cubic-bezier(.22,1,.36,1);pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:900px){.sgrid{grid-template-columns:1fr 1fr}.crow,.brow{grid-template-columns:1fr}}
@media(max-width:640px){.sidebar{display:none}.content{padding:14px}.topbar{padding:11px 14px}.sgrid{grid-template-columns:1fr 1fr}.agrid{grid-template-columns:1fr}.frow{grid-template-columns:1fr}.sb input{width:110px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div style="position:absolute;inset:0;overflow:hidden">
    <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
    <div class="grid"></div>
  </div>
  <div class="lcard">
    <div class="llogo">
      <div class="lmark">LF</div>
      <div><div class="lbrand">LeadFlow</div><div class="ltag">CRM SYSTEM v2.0</div></div>
    </div>
    <h2 class="ltitle">Welcome back, Admin</h2>
    <p class="lsub">Sign in to manage your client leads</p>
    <div class="fg"><label>Email</label><input type="email" id="le" value="admin@leadflow.com"/></div>
    <div class="fg"><label>Password</label><input type="password" id="lp" value="admin123"/></div>
    <div id="lerr" class="lerr" style="display:none">Wrong credentials. Use admin@leadflow.com / admin123</div>
    <button class="btn bp" onclick="login()">Sign In to Dashboard →</button>
    <div class="hint">Demo: admin@leadflow.com / admin123</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="slogo">
      <div class="smark">LF</div>
      <div><div class="stxt">LeadFlow</div><div class="ssub">CRM</div></div>
    </div>
    <nav class="nav">
      <div class="nlbl">MAIN</div>
      <div class="ni on" onclick="sv('dashboard',this)"><span>⬡</span><span>Dashboard</span></div>
