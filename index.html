<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadFlow CRM — Client Lead Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#080a10;--surface:#0d1017;--surface2:#121620;--surface3:#181d28;--border:rgba(255,255,255,0.06);--border-hi:rgba(99,179,237,0.25);--text:#e8eaf2;--text-muted:#6b7280;--text-dim:#9ca3af;--accent:#63b3ed;--new:#60a5fa;--contacted:#fbbf24;--converted:#34d399;--danger:#f87171;--purple:#a78bfa}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:10px}

/* LOGIN */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:var(--bg)}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.25;animation:orbFloat 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:#63b3ed;top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:#a78bfa;bottom:-50px;right:-80px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:#34d399;top:50%;left:50%;animation-delay:-5s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}
.grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(99,179,237,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.04) 1px,transparent 1px);background-size:44px 44px}
.login-card{position:relative;z-index:1;background:rgba(13,16,23,0.9);border:1px solid var(--border-hi);border-radius:24px;padding:40px;width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(99,179,237,0.1),0 40px 80px rgba(0,0,0,0.5);animation:cardIn 0.6s cubic-bezier(.22,1,.36,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.logo-mark{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;color:#fff;box-shadow:0 0 20px rgba(99,179,237,0.4)}
.logo-mark.sm{width:34px;height:34px;border-radius:9px;font-size:0.7rem}
.login-brand{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text)}
.login-tagline{font-size:0.6rem;letter-spacing:2.5px;color:var(--text-muted);text-transform:uppercase}
.login-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:6px}
.login-sub{color:var(--text-muted);font-size:0.85rem;margin-bottom:28px}
.login-error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:12px}
.login-hint{text-align:center;font-size:0.72rem;color:var(--text-muted);margin-top:16px}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:0.72rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--border-hi);box-shadow:0 0 0 3px rgba(99,179,237,0.1)}
.form-group select option{background:var(--surface2)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#63b3ed,#4299e1);color:#fff;box-shadow:0 0 20px rgba(99,179,237,0.3)}
.btn-primary:hover{box-shadow:0 0 30px rgba(99,179,237,0.5);transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-full{width:100%;justify-content:center;padding:13px;font-size:0.95rem}
.btn-arrow{font-size:1rem;transition:transform 0.2s}
.btn-primary:hover .btn-arrow{transform:translateX(3px)}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo-text{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
.logo-sub{font-size:0.56rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
.nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-section-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;padding:6px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:0.83rem;font-weight:500;color:var(--text-muted);transition:all 0.18s;border:1px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:rgba(99,179,237,0.08);border-color:rgba(99,179,237,0.18)}
.nav-icon{font-size:0.9rem;width:18px;text-align:center}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--surface3);color:var(--text-dim);font-size:0.63rem;font-weight:700;padding:2px 7px;border-radius:20px;min-width:22px;text-align:center}
.nav-badge.new-badge{background:rgba(96,165,250,0.15);color:var(--new)}
.nav-badge.contacted-badge{background:rgba(251,191,36,0.15);color:var(--contacted)}
.nav-badge.converted-badge{background:rgba(52,211,153,0.15);color:var(--converted)}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.admin-pill{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:10px;padding:10px 12px}
.admin-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#63b3ed,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;color:#fff;flex-shrink:0}
.admin-name{font-size:0.8rem;font-weight:600}
.admin-role{font-size:0.62rem;color:var(--text-muted)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem;transition:color 0.2s}
.logout-btn:hover{color:var(--danger)}

/* TOPBAR */
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(13,16,23,0.95);backdrop-filter:blur(12px);flex-shrink:0;gap:12px}
.page-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;line-height:1}
.breadcrumb{font-size:0.68rem;color:var(--text-muted);margin-top:3px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;transition:border-color 0.2s}
.search-box:focus-within{border-color:var(--border-hi)}
.search-icon{color:var(--text-muted);font-size:1rem}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.83rem;width:170px}
.search-box input::placeholder{color:var(--text-muted)}

/* CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;padding:24px 28px;overflow-y:auto}
.view{display:none}
.view.active{display:block;animation:viewIn 0.3s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;cursor:default;transition:transform 0.2s,box-shadow 0.2s}
.stat-card:hover{transform:translateY(-3px)}
.stat-card::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;filter:blur(40px);opacity:0.2}
.stat-card.blue{border-color:rgba(96,165,250,0.12)}.stat-card.blue::after{background:var(--new)}.stat-card.blue:hover{box-shadow:0 0 30px rgba(96,165,250,0.1)}
.stat-card.amber{border-color:rgba(251,191,36,0.12)}.stat-card.amber::after{background:var(--contacted)}.stat-card.amber:hover{box-shadow:0 0 30px rgba(251,191,36,0.1)}
.stat-card.orange{border-color:rgba(251,191,36,0.12)}.stat-card.orange::after{background:#f97316}.stat-card.orange:hover{box-shadow:0 0 30px rgba(249,115,22,0.1)}
.stat-card.green{border-color:rgba(52,211,153,0.12)}.stat-card.green::after{background:var(--converted)}.stat-card.green:hover{box-shadow:0 0 30px rgba(52,211,153,0.1)}
.stat-icon{position:absolute;top:16px;right:18px;font-size:1.2rem;opacity:0.3}
.stat-label{font-size:0.66rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;line-height:1}
.stat-card.blue .stat-value{color:var(--new)}.stat-card.amber .stat-value{color:var(--contacted)}.stat-card.orange .stat-value{color:#f97316}.stat-card.green .stat-value{color:var(--converted)}
.stat-trend{font-size:0.7rem;color:var(--text-muted);margin-top:8px}
.stat-pulse{position:absolute;bottom:14px;right:16px;width:8px;height:8px;border-radius:50%;background:var(--new);box-shadow:0 0 0 0 rgba(96,165,250,0.4);animation:pulse 2s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 8px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.chart-title{font-size:0.66rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);font-weight:600;margin-bottom:16px}
.pipeline-bars{display:flex;flex-direction:column;gap:10px}
.pipeline-item{display:flex;flex-direction:column;gap:5px}
.pipeline-label{display:flex;justify-content:space-between;font-size:0.78rem}
.pipeline-label span:last-child{font-weight:600}
.pipeline-track{height:8px;background:var(--surface3);border-radius:20px;overflow:hidden}
.pipeline-fill{height:100%;border-radius:20px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pipeline-fill.new{background:linear-gradient(90deg,var(--new),#93c5fd)}
.pipeline-fill.contacted{background:linear-gradient(90deg,var(--contacted),#fcd34d)}
.pipeline-fill.converted{background:linear-gradient(90deg,var(--converted),#6ee7b7)}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:22px}
.donut-svg{width:110px;height:110px;transform:rotate(-90deg);flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-leg{display:flex;align-items:center;gap:8px;font-size:0.75rem}
.donut-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-leg-label{color:var(--text-dim)}
.donut-leg-val{font-weight:700;color:var(--text);margin-left:auto;padding-left:8px}
.spark-card canvas{display:block;width:100%}
.spark-labels{display:flex;justify-content:space-between;margin-top:6px}
.spark-labels span{font-size:0.62rem;color:var(--text-muted)}
.activity-list{display:flex;flex-direction:column;max-height:180px;overflow-y:auto}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.act-text{font-size:0.8rem;color:var(--text-dim);line-height:1.4}
.act-text strong{color:var(--text)}
.act-time{font-size:0.67rem;color:var(--text-muted);margin-top:2px}
.empty-activity{font-size:0.8rem;color:var(--text-muted);padding:16px 0;text-align:center}

/* LEADS TABLE */
.leads-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all 0.18s;font-family:'DM Sans',sans-serif}
.filter-btn:hover,.filter-btn.active{color:var(--text);border-color:var(--accent);background:rgba(99,179,237,0.08)}
.leads-meta{font-size:0.75rem;color:var(--text-muted)}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.leads-table{width:100%;border-collapse:collapse}
.leads-table th{padding:13px 16px;text-align:left;font-size:0.65rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.leads-table th:hover{color:var(--text)}
.leads-table td{padding:13px 16px;font-size:0.83rem;border-bottom:1px solid var(--border);vertical-align:middle}
.leads-table tr:last-child td{border-bottom:none}
.leads-table tbody tr{transition:background 0.15s}
.leads-table tbody tr:hover{background:var(--surface2)}
.lead-name{font-weight:600;color:var(--text)}
.lead-company{font-size:0.72rem;color:var(--text-muted)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:700}
.badge-new{background:rgba(96,165,250,0.12);color:var(--new);border:1px solid rgba(96,165,250,0.2)}
.badge-contacted{background:rgba(251,191,36,0.12);color:var(--contacted);border:1px solid rgba(251,191,36,0.2)}
.badge-converted{background:rgba(52,211,153,0.12);color:var(--converted);border:1px solid rgba(52,211,153,0.2)}
.source-tag{background:var(--surface3);color:var(--text-dim);padding:3px 9px;border-radius:6px;font-size:0.72rem}
.date-cell{font-size:0.75rem;color:var(--text-muted);white-space:nowrap}
.notes-preview{max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.75rem;color:var(--text-muted)}
.actions-cell{display:flex;gap:5px}
.action-btn{padding:5px 9px;border-radius:7px;cursor:pointer;font-size:0.72rem;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all 0.15s;font-family:'DM Sans',sans-serif}
.action-btn:hover{background:var(--surface3);color:var(--text)}
.action-btn.edit:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.notes-btn:hover{border-color:var(--purple);color:var(--purple)}
.action-btn.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,113,113,0.08)}
.status-select{background:var(--surface3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.75rem;padding:4px 8px;cursor:pointer;outline:none}
.table-empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:2.5rem;opacity:0.15;margin-bottom:12px}
.empty-msg{color:var(--text-muted);margin-bottom:16px;font-size:0.85rem}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
.analytics-card.full{grid-column:1/-1}
.funnel-wrap{display:flex;flex-direction:column;gap:8px}
.funnel-step{display:flex;align-items:center;gap:14px}
.funnel-label{width:90px;font-size:0.78rem;color:var(--text-dim);flex-shrink:0}
.funnel-bar-wrap{flex:1}
.funnel-track{height:32px;background:var(--surface3);border-radius:8px;overflow:hidden}
.funnel-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding:0 12px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.funnel-fill span{font-size:0.75rem;font-weight:700;color:#fff;white-space:nowrap}
.funnel-pct{width:50px;text-align:right;font-size:0.78rem;font-weight:700}
.breakdown-list{display:flex;flex-direction:column;gap:12px}
.breakdown-item{display:flex;align-items:center;gap:10px}
.bk-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.bk-name{flex:1;font-size:0.82rem;color:var(--text-dim)}
.bk-count{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700}
.bk-pct{font-size:0.72rem;color:var(--text-muted);margin-left:4px}
.sources-list{display:flex;flex-direction:column;gap:10px}
.source-item-label{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:5px}
.source-item-label span:last-child{font-weight:600}
.source-track{height:6px;background:var(--surface3);border-radius:20px;overflow:hidden}
.source-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--purple),#818cf8);transition:width 1s cubic-bezier(.4,0,.2,1)}
.trend-chart{display:flex;align-items:flex-end;gap:8px;height:80px;padding-top:10px}
.trend-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.trend-bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent),rgba(99,179,237,0.25));min-height:4px}
.trend-lbl{font-size:0.6rem;color:var(--text-muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex;animation:overlayIn 0.2s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border-hi);border-radius:20px;width:100%;max-width:560px;box-shadow:0 0 80px rgba(0,0,0,0.6);animation:modalIn 0.3s cubic-bezier(.22,1,.36,1);max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 0}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:0 24px 22px}
.status-selector{display:flex;gap:8px}
.status-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 8px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.78rem;font-weight:600;color:var(--text-muted);transition:all 0.15s}
.status-opt:hover{border-color:var(--border-hi);color:var(--text)}
.status-opt.active{background:rgba(99,179,237,0.1);border-color:var(--border-hi);color:var(--text)}
.status-dot{width:7px;height:7px;border-radius:50%}
.notes-modal{max-width:480px}
.notes-lead-info{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:0.82rem;color:var(--text-dim)}
.notes-lead-info strong{color:var(--text);display:block;margin-bo
