<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadFlow CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a10;--s:#0d1017;--s2:#121620;--s3:#181d28;
  --bd:rgba(255,255,255,0.07);--bh:rgba(99,179,237,0.3);
  --tx:#e8eaf2;--tm:#6b7280;--td:#9ca3af;
  --ac:#63b3ed;--nw:#60a5fa;--ct:#fbbf24;--cv:#34d399;--dg:#f87171;--pu:#a78bfa
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}

/* ═══ LOGIN ═══ */
#loginScreen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:100
}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.2;animation:fl 8s ease-in-out infinite}
.o1{width:350px;height:350px;background:#63b3ed;top:-80px;left:-80px}
.o2{width:280px;height:280px;background:#a78bfa;bottom:-40px;right:-60px;animation-delay:-3s}
.o3{width:180px;height:180px;background:#34d399;top:40%;left:40%;animation-delay:-5s}
@keyframes fl{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}
.gridBg{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(99,179,237,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,179,237,0.04) 1px,transparent 1px);
  background-size:40px 40px
}
.loginCard{
  position:relative;z-index:1;
  background:rgba(13,16,23,0.95);
  border:1px solid var(--bh);
  border-radius:22px;padding:38px;
  width:90%;max-width:400px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(99,179,237,0.12),0 30px 60px rgba(0,0,0,0.5)
}
.logoMark{
  width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,#63b3ed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff
}
.logoRow{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.brandName{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800}
.brandTag{font-size:0.58rem;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.loginTitle{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:5px}
.loginSub{color:var(--tm);font-size:0.83rem;margin-bottom:24px}
.fGroup{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fGroup label{font-size:0.68rem;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:0.8px}
.fGroup input{
  background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:11px 13px;color:var(--tx);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;
  outline:none;transition:border-color 0.2s;width:100%
}
.fGroup input:focus{border-color:var(--bh);box-shadow:0 0 0 3px rgba(99,179,237,0.1)}
.loginErr{
  background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);
  color:var(--dg);padding:9px 13px;border-radius:8px;
  font-size:0.8rem;margin-bottom:11px;display:none
}
.loginHint{
  text-align:center;font-size:0.72rem;color:var(--tm);
  margin-top:14px;background:var(--s2);padding:9px;border-radius:8px
}
.btnPrimary{
  background:linear-gradient(135deg,#63b3ed,#4299e1);
  color:#fff;border:none;border-radius:9px;
  padding:13px;font-size:0.92rem;font-weight:600;
  cursor:pointer;width:100%;margin-top:4px;
  font-family:'DM Sans',sans-serif;transition:all 0.2s
}
.btnPrimary:hover{box-shadow:0 0 25px rgba(99,179,237,0.4);transform:translateY(-1px)}
.btnPrimary:active{transform:translateY(0)}

/* ═══ APP SHELL ═══ */
#appShell{display:none;height:100vh;overflow:hidden;flex-direction:row}

/* SIDEBAR */
.sidebar{
  width:215px;flex-shrink:0;
  background:var(--s);border-right:1px solid var(--bd);
  display:flex;flex-direction:column
}
.sidebarLogo{
  padding:20px 16px 17px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:11px
}
.sideMark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#63b3ed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:0.68rem;color:#fff
}
.sideName{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800}
.sideSub{font-size:0.54rem;letter-spacing:2px;color:var(--tm);text-transform:uppercase}
.navMenu{flex:1;padding:12px 9px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.navSec{font-size:0.58rem;color:var(--tm);text-transform:uppercase;letter-spacing:2px;padding:5px 10px 3px}
.navItem{
  display:flex;align-items:center;gap:9px;
  padding:8px 11px;border-radius:9px;
  cursor:pointer;font-size:0.81rem;font-weight:500;
  color:var(--tm);transition:all 0.17s;border:1px solid transparent
}
.navItem:hover{color:var(--tx);background:var(--s2)}
.navItem.active{color:var(--ac);background:rgba(99,179,237,0.08);border-color:rgba(99,179,237,0.18)}
.navDot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.navBadge{
  margin-left:auto;font-size:0.61rem;font-weight:700;
  padding:2px 6px;border-radius:20px;background:var(--s3);color:var(--td)
}
.navBadge.isNew{background:rgba(96,165,250,0.15);color:var(--nw)}
.navBadge.isCon{background:rgba(251,191,36,0.15);color:var(--ct)}
.navBadge.isConv{background:rgba(52,211,153,0.15);color:var(--cv)}
.sideFooter{padding:13px;border-top:1px solid var(--bd)}
.adminPill{display:flex;align-items:center;gap:9px;background:var(--s2);border-radius:9px;padding:9px 11px}
.adminAv{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#63b3ed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:700;color:#fff;flex-shrink:0
}
.adminName{font-size:0.78rem;font-weight:600}
.adminRole{font-size:0.6rem;color:var(--tm)}
.logoutBtn{margin-left:auto;background:none;border:none;color:var(--tm);cursor:pointer;font-size:0.88rem}
.logoutBtn:hover{color:var(--dg)}

/* MAIN */
.mainArea{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topBar{
  padding:14px 26px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,16,23,0.95);flex-shrink:0;gap:10px
}
.pageTitle{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700}
.pageBc{font-size:0.66rem;color:var(--tm);margin-top:2px}
.topRight{display:flex;align-items:center;gap:9px;flex-shrink:0}
.searchBox{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--bd);
  border-radius:9px;padding:7px 11px
}
.searchBox:focus-within{border-color:var(--bh)}
.searchBox input{
  background:transparent;border:none;outline:none;
  color:var(--tx);font-family:'DM Sans',sans-serif;font-size:0.81rem;width:150px
}
.searchBox input::placeholder{color:var(--tm)}
.addBtn{
  background:linear-gradient(135deg,#63b3ed,#4299e1);
  color:#fff;border:none;border-radius:9px;
  padding:9px 16px;font-size:0.82rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap
}
.addBtn:hover{box-shadow:0 0 20px rgba(99,179,237,0.3)}

/* CONTENT */
.contentArea{flex:1;padding:22px 26px;overflow-y:auto}
.viewPanel{display:none}
.viewPanel.active{display:block;animation:fadeUp 0.28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ DASHBOARD ═══ */
.statsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.statCard{
  background:var(--s);border:1px solid var(--bd);
  border-radius:15px;padding:18px;
  position:relative;overflow:hidden;transition:transform 0.2s
}
.statCard:hover{transform:translateY(-2px)}
.statCard::after{
  content:'';position:absolute;top:-25px;right:-25px;
  width:90px;height:90px;border-radius:50%;filter:blur(35px);opacity:0.2
}
.statCard.blue{border-color:rgba(96,165,250,0.15)}.statCard.blue::after{background:var(--nw)}
.statCard.amber{border-color:rgba(251,191,36,0.15)}.statCard.amber::after{background:var(--ct)}
.statCard.orange{border-color:rgba(249,115,22,0.15)}.statCard.orange::after{background:#f97316}
.statCard.green{border-color:rgba(52,211,153,0.15)}.statCard.green::after{background:var(--cv)}
.statCard.blue:hover{box-shadow:0 0 25px rgba(96,165,250,0.1)}
.statCard.amber:hover{box-shadow:0 0 25px rgba(251,191,36,0.1)}
.statCard.orange:hover{box-shadow:0 0 25px rgba(249,115,22,0.1)}
.statCard.green:hover{box-shadow:0 0 25px rgba(52,211,153,0.1)}
.statIcon{position:absolute;top:14px;right:16px;font-size:1.1rem;opacity:0.28}
.statLabel{font-size:0.64rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--tm);margin-bottom:7px}
.statVal{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;line-height:1}
.statCard.blue .statVal{color:var(--nw)}
.statCard.amber .statVal{color:var(--ct)}
.statCard.orange .statVal{color:#f97316}
.statCard.green .statVal{color:var(--cv)}
.statTrend{font-size:0.68rem;color:var(--tm);margin-top:7px}
.statPulse{
  position:absolute;bottom:13px;right:15px;
  width:7px;height:7px;border-radius:50%;background:var(--nw);
  animation:pulse 2s infinite
}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}

.chartsRow{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px}
.bottomRow{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.chartCard{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:18px}
.chartTitle{font-size:0.63rem;text-transform:uppercase;letter-spacing:2px;color:var(--tm);font-weight:600;margin-bottom:14px}

/* Pipeline */
.pipeWrap{display:flex;flex-direction:column;gap:9px}
.pipeItem{display:flex;flex-direction:column;gap:4px}
.pipeLabel{display:flex;justify-content:space-between;font-size:0.76rem}
.pipeLabel span:last-child{font-weight:600}
.pipeTrack{height:7px;background:var(--s3);border-radius:20px;overflow:hidden}
.pipeFill{height:100%;border-radius:20px;transition:width 1s}
.pipeFill.new{background:linear-gradient(90deg,var(--nw),#93c5fd)}
.pipeFill.con{background:linear-gradient(90deg,var(--ct),#fcd34d)}
.pipeFill.conv{background:linear-gradient(90deg,var(--cv),#6ee7b7)}

/* Donut */
.donutWrap{display:flex;align-items:center;justify-content:center;gap:20px}
.donutSvg{width:100px;height:100px;transform:rotate(-90deg);flex-shrink:0}
.donutLegend{display:flex;flex-direction:column;gap:7px}
.donutItem{display:flex;align-items:center;gap:7px;font-size:0.73rem}
.donutSwatch{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.donutVal{font-weight:700;color:var(--tx);margin-left:auto;padding-left:7px}

/* Sparkline */
.sparkWrap canvas{display:block;width:100%}
.sparkLabels{display:flex;justify-content:space-between;margin-top:5px}
.sparkLabels span{font-size:0.6rem;color:var(--tm)}

/* Activity */
.actList{display:flex;flex-direction:column;max-height:170px;overflow-y:auto}
.actItem{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd)}
.actItem:last-child{border-bottom:none}
.actDot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.actText{font-size:0.78rem;color:var(--td);line-height:1.4}
.actText strong{color:var(--tx)}
.actTime{font-size:0.65rem;color:var(--tm);margin-top:2px}
.actEmpty{font-size:0.78rem;color:var(--tm);padding:14px 0;text-align:center}

/* ═══ LEADS TABLE ═══ */
.leadsToolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.filterBtns{display:flex;gap:5px;flex-wrap:wrap}
.filterBtn{
  padding:6px 13px;border-radius:7px;font-size:0.76rem;font-weight:600;
  cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--tm);
  transition:all 0.17s;font-family:'DM Sans',sans-serif
}
.filterBtn:hover,.filterBtn.active{color:var(--tx);border-color:var(--ac);background:rgba(99,179,237,0.08)}
.leadsMeta{font-size:0.73rem;color:var(--tm)}
.tableCard{background:var(--s);border:1px solid var(--bd);border-radius:15px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:620px}
th{
  padding:12px 15px;text-align:left;font-size:0.63rem;font-weight:700;
  color:var(--tm);text-transform:uppercase;letter-spacing:1.1px;
  background:var(--s2);border-bottom:1px solid var(--bd);
  cursor:pointer;white-space:nowrap
}
th:hover{color:var(--tx)}
td{padding:12px 15px;font-size:0.81rem;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.14s}
tbody tr:hover{background:var(--s2)}
.leadName{font-weight:600;color:var(--tx)}
.leadCo{font-size:0.7rem;color:var(--tm)}
.srcTag{background:var(--s3);color:var(--td);padding:3px 8px;border-radius:5px;font-size:0.7rem}
.dateCell{font-size:0.73rem;color:var(--tm);white-space:nowrap}
.notePreview{max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.73rem;color:var(--tm)}
.actBtns{display:flex;gap:4px}
.actBtn{
  padding:5px 8px;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600;
  border:1px solid var(--bd);background:var(--s2);color:var(--tm);
  transition:all 0.14s;font-family:'DM Sans',sans-serif
}
.actBtn:hover{background:var(--s3);color:var(--tx)}
.actBtn.edit:hover{border-color:var(--ac);color:var(--ac)}
.actBtn.note:hover{border-color:var(--pu);color:var(--pu)}
.actBtn.del:hover{border-color:var(--dg);color:var(--dg);background:rgba(248,113,113,0.08)}
.statusSel{
  background:var(--s3);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font-family:'DM Sans',sans-serif;
  font-size:0.73rem;padding:3px 7px;cursor:pointer;outline:none
}
.tableEmpty{padding:50px 20px;text-align:center}
.emptyIco{font-size:2rem;opacity:0.13;margin-bottom:10px}
.emptyMsg{color:var(--tm);margin-bottom:14px;font-size:0.83rem}

/* ═══ ANALYTICS ═══ */
.analyticsGrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.anaCard{background:var(--s);border:1px solid var(--bd);border-radius:15px;padding:20px}
.anaCard.full{grid-column:1/-1}
.funnelWrap{display:flex;flex-direction:column;gap:7px}
.funnelStep{display:flex;align-items:center;gap:12px}
.funnelLabel{width:90px;font-size:0.76rem;color:var(--td);flex-shrink:0}
.funnelTrack{height:30px;background:var(--s3);border-radius:7px;overflow:hidden;flex:1}
.funnelFill{
  height:100%;border-radius:7px;
  display:flex;align-items:center;padding:0 10px;transition:width 1s
}
.funnelFill span{font-size:0.73rem;font-weight:700;color:#fff;white-space:nowrap}
.funnelPct{width:45px;text-align:right;font-size:0.76rem;font-weight:700}
.bkList{display:flex;flex-direction:column;gap:11px}
.bkItem{display:flex;align-items:center;gap:9px}
.bkDot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.bkName{flex:1;font-size:0.8rem;color:var(--td)}
.bkCount{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700}
.bkPct{font-size:0.7rem;color:var(--tm);margin-left:3px}
.srcList{display:flex;flex-direction:column;gap:9px}
.srcItemLabel{display:flex;justify-content:space-between;font-size:0.76rem;margin-bottom:4px}
.srcItemLabel span:last-child{font-weight:600}
.srcTrack{height:5px;background:var(--s3);border-radius:20px;overflow:hidden}
.srcFill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--pu),#818cf8);transition:width 1s}
.trendChart{display:flex;align-items:flex-end;gap:7px;height:75px;padding-top:8px}
.trendCol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.trendBar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--ac),rgba(99,179,237,0.2));min-height:3px}
.trendLbl{font-size:0.58rem;color:var(--tm)}

/* ═══ MODAL ═══ */
.modalOverlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;padding:18px
}
.modalOverlay.open{display:flex}
.modalBox{
  background:var(--s);border:1px solid var(--bh);
  border-radius:18px;width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;
  animation:popUp 0.28s cubic-bezier(0.22,1,0.36,1)
}
@keyframes popUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modalHead{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modalHeadTitle{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700}
.modalClose{background:none;border:none;color:var(--tm);cursor:pointer;font-size:1rem}
.modalClose:hover{color:var(--tx)}
.modalBody{padding:18px 22px}
.modalFoot{display:flex;justify-content:flex-end;gap:9px;padding:0 22px 20px}
.fRow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fGrp{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fGrp label{font-size:0.68rem;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:0.8px}
.fGrp input,.fGrp select,.fGrp textarea{
  background:var(--s2);border:1px solid var(--bd);border-radius:9px;
  padding:10px 13px;color:var(--tx);
  font-family:'DM Sans',sans-serif;font-size:0.85rem;
  outline:none;transition:border-color 0.2s;width:100%
}
.fGrp input:focus,.fGrp select:focus,.fGrp textarea:focus{border-color:var(--bh)}
.fGrp select option{background:var(--s2)}
.fGrp textarea{resize:vertical;min-height:75px}
.btnGhost{
  background:var(--s2);color:var(--td);border:1px solid var(--bd);
  border-radius:9px;padding:10px 18px;
  font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer
}
.btnGhost:hover{background:var(--s3);color:var(--tx)}
.statusPicker{display:flex;gap:7px}
.statusOpt{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);
  cursor:pointer;font-size:0.76rem;font-weight:600;color:var(--tm);transition:all 0.14s
}
.statusOpt:hover{border-color:var(--bh);color:var(--tx)}
.statusOpt.active{background:rgba(99,179,237,0.1);border-color:var(--bh);color:var(--tx)}
.statusDot{width:6px;height:6px;border-radius:50%}

/* Notes modal */
.notesModal{max-width:460px}
.notesLeadInfo{
  background:var(--s2);border-radius:9px;padding:11px 13px;
  margin-bottom:13px;font-size:0.8rem;color:var(--td)
}
.notesLeadInfo strong{color:var(--tx);display:block;margin-bottom:2px}
.notesHistory{display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto;margin-bottom:13px}
.noteItem{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px}
.noteTxt{font-size:0.8rem;color:var(--td);line-height:1.5}
.noteMeta{font-size:0.65rem;color:var(--tm);margin-top:4px}
.noNotesMsg{font-size:0.78rem;color:var(--tm);text-align:center;padding:14px 0}
.notesAdd{display:flex;flex-direction:column;gap:7px}

/* Toast */
.toastMsg{
  position:fixed;bottom:22px;right:22px;z-index:9999;
  background:var(--s3);border:1px solid var(--bh);
  color:var(--tx);padding:11px 18px;border-radius:11px;
  font-size:0.81rem;font-weight:500;
